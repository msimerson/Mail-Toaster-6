<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Mail Toaster</title>
  <style>
    :root {
      --bg:      #0d1117;
      --card:    #161b22;
      --border:  #30363d;
      --accent:  #58a6ff;
      --text:    #c9d1d9;
      --muted:   #8b949e;
      --radius:  10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 1.5rem;
    }
    main { width: 100%; max-width: 720px; flex: 1; }
    section { margin-bottom: 2.5rem; }
    h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    /* Webmail cards */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      min-height: 220px; /* prevent layout jump while probing */
    }
    .card {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, transform 0.15s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: top left;
      display: block;
      border-bottom: 1px solid var(--border);
    }
    .card-name { padding: 0.6rem 1rem; font-size: 0.9rem; font-weight: 500; }

    /* Admin grid */
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.6rem;
    }
    .admin-link {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      color: var(--text);
      text-decoration: none;
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: border-color 0.15s, color 0.15s;
    }
    .admin-link:hover { border-color: var(--accent); color: var(--accent); }

    /* Auth prompt */
    .auth-prompt {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.4rem;
      color: var(--muted);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .auth-prompt span { flex: 1; }
    .auth-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0.35rem 0.8rem;
      white-space: nowrap;
      transition: border-color 0.15s;
    }
    .auth-btn:hover { border-color: var(--accent); }

    /* Footer */
    footer {
      width: 100%;
      max-width: 720px;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>
<main>
  <section>
    <h2>Webmail</h2>
    <div class="cards" id="webmail-grid"></div>
  </section>

  <section id="admin-section" hidden>
    <h2>Admin</h2>
    <div class="admin-grid" id="admin-grid"></div>
  </section>

  <section id="auth-section">
    <div class="auth-prompt">
      <span>Admin tools are available after authentication.</span>
      <button class="auth-btn" id="auth-btn" type="button">Log in</button>
    </div>
  </section>
</main>

<footer>
  <a href="https://github.com/msimerson/Mail-Toaster-6" target="_blank" rel="noopener noreferrer">Powered by Mail Toaster</a>
</footer>

<script>
  // Webmail clients: check URL is probed; href is the link destination.
  const WEBMAIL = [
    { label: 'Roundcube',  href: '/roundcube/',  img: '/img/roundcube.png',  check: '/roundcube/'  },
    { label: 'Snappymail', href: '/snappymail/', img: '/img/snappymail.png', check: '/snappymail/' },
  ];

  // Admin tools: shown only after successful auth check.
  // check defaults to href when omitted.
  const ADMIN = [
    { label: 'qmailadmin',     href: '/cgi-bin/qmailadmin/qmailadmin/' },
    { label: 'rspamd',         href: '/rspamd/'           },
    { label: 'haraka',         href: '/haraka/'           },
    { label: 'watch',          href: '/watch',            },
    { label: 'snappy adm',     href: '/snappymail/?admin', check: '/snappymail/' },
    { label: 'dmarc',          href: '/dmarc'             },
    { label: 'munin',          href: '/munin/'            },
    { label: 'nagios',         href: '/nagios'            },
    { label: 'grafana',        href: '/grafana'           },
    { label: 'prometheus',     href: '/prometheus'        },
    { label: 'kibana',         href: '/kibana'            },
    // { label: 'vqadmin',     href: '/cgi-bin/vqadmin/vqadmin.cgi' },
    // { label: 'rainloop adm',href: '/rainloop/?admin', check: '/rainloop/' },
  ];

  // Returns true if the backend is reachable (any response except proxy errors).
  async function isAlive(url) {
    try {
      const r = await fetch(url, {
        credentials: 'include',
        signal: AbortSignal.timeout(2000),
      });
      // 502/503/504 = nginx couldn't reach the backend jail
      return [404, 502, 503, 504].includes(r.status) ? false : true;
    } catch (_) {
      return false; // network error or timeout
    }
  }

  function addCard(service) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = service.href;
    a.innerHTML =
      `<img src="${service.img}" alt="${service.label}">` +
      `<div class="card-name">${service.label}</div>`;
    document.getElementById('webmail-grid').appendChild(a);
  }

  function addAdminLink(service) {
    const a = document.createElement('a');
    a.className = 'admin-link';
    a.href = service.href;
    a.textContent = service.label;
    document.getElementById('admin-grid').appendChild(a);
  }

  function probeAndAdd(services, addFn) {
    return services.map(async (svc) => {
      if (await isAlive(svc.check || svc.href)) addFn(svc);
    });
  }

  async function checkAuth() {
    try {
      const r = await fetch('/auth-check', { credentials: 'include' });
      if (r.ok) {
        document.getElementById('admin-section').hidden = false;
        document.getElementById('auth-section').hidden = true;
        await Promise.all(probeAndAdd(ADMIN, addAdminLink));
        return true;
      }
    } catch (_) {}
    return false;
  }

  document.getElementById('auth-btn').addEventListener('click', function () {
    window.open('/qmailadmin', '_blank', 'noopener,noreferrer');
    let attempts = 0;
    const poll = setInterval(async function () {
      attempts++;
      if (await checkAuth() || attempts > 30) clearInterval(poll);
    }, 1000);
  });

  // Probe webmail and auth in parallel on load.
  Promise.all([
    ...probeAndAdd(WEBMAIL, addCard),
    checkAuth(),
  ]);
</script>
</body>
</html>
