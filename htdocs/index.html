<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Mail Toaster</title>
  <style>
    :root {
      --bg:      #0d1117;
      --card:    #161b22;
      --border:  #30363d;
      --accent:  #58a6ff;
      --text:    #c9d1d9;
      --muted:   #8b949e;
      --radius:  10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 1.5rem;
    }
    main { width: 100%; max-width: 720px; flex: 1; }
    section { margin-bottom: 2.5rem; }
    h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    /* Webmail cards */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .card {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, transform 0.15s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: top left;
      display: block;
      border-bottom: 1px solid var(--border);
    }
    .card-name { padding: 0.6rem 1rem; font-size: 0.9rem; font-weight: 500; }

    /* Admin grid */
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.6rem;
    }
    .admin-link {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      color: var(--text);
      text-decoration: none;
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: border-color 0.15s, color 0.15s;
    }
    .admin-link:hover { border-color: var(--accent); color: var(--accent); }

    /* Auth prompt */
    .auth-prompt {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.4rem;
      color: var(--muted);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .auth-prompt span { flex: 1; }
    .auth-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0.35rem 0.8rem;
      text-decoration: none;
      white-space: nowrap;
      transition: border-color 0.15s;
    }
    .auth-btn:hover { border-color: var(--accent); }

    /* Footer */
    footer {
      width: 100%;
      max-width: 720px;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>
<main>
  <section>
    <h2>Webmail</h2>
    <div class="cards">
      <a class="card" href="/roundcube/">
        <img src="/img/roundcube.png" alt="Roundcube">
        <div class="card-name">Roundcube</div>
      </a>
      <a class="card" href="/snappymail/">
        <img src="/img/snappymail.png" alt="Snappymail">
        <div class="card-name">Snappymail</div>
      </a>
    </div>
  </section>

  <section id="admin-section" hidden>
    <h2>Admin</h2>
    <div class="admin-grid">
      <a class="admin-link" href="/cgi-bin/qmailadmin/qmailadmin/">qmailadmin</a>
      <a class="admin-link" href="/rspamd/">rspamd</a>
      <a class="admin-link" href="/haraka/">haraka</a>
      <a class="admin-link" href="/watch">watch</a>
      <a class="admin-link" href="/snappymail/?admin">snappymail</a>
      <a class="admin-link" href="/dmarc">dmarc</a>
      <a class="admin-link" href="/munin/">munin</a>
      <a class="admin-link" href="/nagios">nagios</a>
      <a class="admin-link" href="/grafana">grafana</a>
      <a class="admin-link" href="/prometheus">prometheus</a>
      <a class="admin-link" href="/kibana">kibana</a>
      <!-- <a class="admin-link" href="/rainloop/?admin">rainloop</a> -->
      <!-- <a class="admin-link" href="/cgi-bin/vqadmin/vqadmin.cgi">vqadmin</a> -->
    </div>
  </section>

  <section id="auth-section">
    <div class="auth-prompt">
      <span>Admin tools are available after authentication.</span>
      <button class="auth-btn" id="auth-btn" type="button">Log in</button>
    </div>
  </section>
</main>

<footer>
  <a href="https://github.com/msimerson/Mail-Toaster-6" target="_blank" rel="noopener noreferrer">Powered by Mail Toaster</a>
</footer>

<script>
  function showAdmin() {
    document.getElementById('admin-section').hidden = false;
    document.getElementById('auth-section').hidden = true;
  }

  async function checkAuth() {
    try {
      const r = await fetch('/auth-check', { credentials: 'include' });
      if (r.ok) { showAdmin(); return true; }
    } catch (_) {}
    return false;
  }

  document.getElementById('auth-btn').addEventListener('click', function () {
    // Open a protected page in a new tab to trigger the browser's auth dialog.
    // Poll until credentials are cached and /auth-check succeeds.
    window.open('/qmailadmin', '_blank', 'noopener,noreferrer');
    let attempts = 0;
    const poll = setInterval(async function () {
      attempts++;
      if (await checkAuth() || attempts > 30) clearInterval(poll);
    }, 1000);
  });

  checkAuth();
</script>
</body>
</html>
