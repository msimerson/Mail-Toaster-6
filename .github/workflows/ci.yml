name: CI Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: master

jobs:
  shellcheck:
    permissions:
      contents: read
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@master
      env:
        SHELLCHECK_OPTS: -s bash -e SC1004,SC1091,SC2009,SC2016,SC2039,SC2086,SC2119,SC2153

  bats:
    name: Bats
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: Setup Bats
      run: git submodule update --init --recursive
    - name: bats test
      run: |
        ./test/bats/bin/bats test/*.bats test/include/*.bats test/provision/*.bats

  freebsd:
    runs-on: ubuntu-latest
    name: FreeBSD
    permissions: {}
    steps:
    - uses: actions/checkout@v6
    - name: Test in FreeBSD
      id: test
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        prepare: |
          pkg install -y curl ca_root_nss git-lite
        run: |
          pwd
          whoami
          freebsd-version
          uname -a
          git config --global --add safe.directory /home/runner/work/Mail-Toaster-6/Mail-Toaster-6
          ./test/config.sh
          . mail-toaster.conf
          . mail-toaster.sh